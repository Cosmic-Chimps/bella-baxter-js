name: Publish JS SDK to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v5

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"
          # Detect prerelease (contains a hyphen, e.g. 0.1.1-preview.1)
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="preview"
          else
            DIST_TAG="latest"
          fi
          echo "dist-tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Using dist-tag: $DIST_TAG"

      - name: Verify package.json versions match tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for PKG in packages/kiota-client packages/sdk packages/express packages/nestjs packages/next packages/fastify packages/adonis; do
            PKG_VERSION=$(python3 -c "import json; print(json.load(open('$PKG/package.json'))['version'])")
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::$PKG/package.json version '$PKG_VERSION' != tag version '$VERSION'"
              exit 1
            fi
          done
          echo "✓ All package.json versions match $VERSION"

      - name: Set production API URL
        env:
          BELLA_BAXTER_API_URL: ${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}
        run: |
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . \
              --include='*.ts' \
              | xargs sed -i "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
          fi

      - name: Generate Kiota TypeScript client
        run: |
          dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0
          kiota update -o packages/kiota-client/src/generated

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: |
          # Build in topological order: kiota-client → sdk → framework packages
          pnpm --filter @bella-baxter/kiota-client build
          pnpm --filter @bella-baxter/sdk build
          pnpm --filter @bella-baxter/express build
          pnpm --filter @bella-baxter/nestjs build
          pnpm --filter @bella-baxter/next build
          pnpm --filter @bella-baxter/fastify build
          pnpm --filter @bella-baxter/adonis build

      - name: Publish @bella-baxter/kiota-client
        working-directory: packages/kiota-client
        run: pnpm publish --access public --no-git-checks --tag ${{ steps.version.outputs.dist-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for @bella-baxter/kiota-client on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @bella-baxter/kiota-client@$VERSION on npm..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "https://registry.npmjs.org/@bella-baxter%2Fkiota-client/$VERSION" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print('yes' if 'version' in d else 'no')" \
              2>/dev/null || echo "no")
            if [ "$STATUS" = "yes" ]; then
              echo "✓ @bella-baxter/kiota-client@$VERSION is on npm"
              break
            fi
            echo "  attempt $i/30 — not yet, waiting 15s..."
            sleep 15
          done

      - name: Publish @bella-baxter/sdk
        working-directory: packages/sdk
        run: pnpm publish --access public --no-git-checks --tag ${{ steps.version.outputs.dist-tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for @bella-baxter/sdk on npm
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @bella-baxter/sdk@$VERSION on npm..."
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "https://registry.npmjs.org/@bella-baxter%2Fsdk/$VERSION" \
              | python3 -c "import json,sys; d=json.load(sys.stdin); print('yes' if 'version' in d else 'no')" \
              2>/dev/null || echo "no")
            if [ "$STATUS" = "yes" ]; then
              echo "✓ @bella-baxter/sdk@$VERSION is on npm"
              break
            fi
            echo "  attempt $i/30 — not yet, waiting 15s..."
            sleep 15
          done

      - name: Publish framework packages
        run: |
          DIST_TAG="${{ steps.version.outputs.dist-tag }}"
          for PKG in express nestjs next fastify adonis; do
            echo "Publishing @bella-baxter/$PKG..."
            (cd packages/$PKG && pnpm publish --access public --no-git-checks --tag "$DIST_TAG")
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  notify_slack:
    runs-on: ubuntu-latest
    needs: [publish]
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "*JS SDK npm publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*JS SDK npm publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
